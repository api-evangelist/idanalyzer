specificationVersion: '0.1'
id: idanalyzer-plans-pricing
name: ID Analyzer Plans and Pricing
description: >-
  ID Analyzer offers cloud API subscription plans billed monthly or annually
  (25% discount for annual). Plans are denominated in API credits, where a
  standard ID verification consumes 1 credit and a DocuPass hosted
  verification consumes 2 credits. An on-premise enterprise option (ID Fort)
  is available with custom pricing.
url: https://www.idanalyzer.com/en/pricing
plans:
  - name: Try Free
    description: >-
      No-cost trial plan for developers evaluating the ID Analyzer API.
      Includes 100 test credits per month with access to all core features.
      No credit card required.
    url: https://portal2.idanalyzer.com
    price:
      amount: 0
      currency: USD
      period: monthly
    quotas:
      - type: APICredits
        limit: 100
        period: monthly
        description: 100 API credits per month (test mode)
      - type: VaultStorage
        limit: 1000
        unit: documents
        description: Up to 1,000 stored identity documents in Transaction Vault
    features:
      - All core API features
      - Document OCR and verification
      - Face matching and liveness
      - AML/PEP screening
      - Transaction Vault access

  - name: Entry
    description: >-
      Entry-level paid plan for small-scale production identity verification.
      Suitable for approximately 1,000 ID verifications or 500 DocuPass
      verifications per month. Overage charges apply at $0.12 per call.
    url: https://www.idanalyzer.com/en/pricing
    price:
      amount: 89
      currency: USD
      period: monthly
    quotas:
      - type: APICredits
        limit: 1000
        period: monthly
        description: 1,000 API credits included per month
      - type: VaultStorage
        limit: 10000
        unit: documents
        description: Up to 10,000 stored documents in Transaction Vault
      - type: Overage
        rate: 0.12
        currency: USD
        unit: per-call
        description: $0.12 per API call exceeding monthly quota
    features:
      - All core API features
      - Document OCR and fraud detection
      - Face matching and liveness detection
      - AML/PEP screening
      - Prime ID Scanner (desktop)
      - Transaction Vault
    excludes:
      - DocuPass Personalized Branding

  - name: Advanced
    description: >-
      Most popular plan for growing businesses. Supports approximately 5,000
      ID verifications or 2,500 DocuPass verifications per month. Reduced
      overage rate of $0.10 per call.
    url: https://www.idanalyzer.com/en/pricing
    price:
      amount: 350
      currency: USD
      period: monthly
    quotas:
      - type: APICredits
        limit: 5000
        period: monthly
        description: 5,000 API credits included per month
      - type: VaultStorage
        limit: 50000
        unit: documents
        description: Up to 50,000 stored documents in Transaction Vault
      - type: Overage
        rate: 0.10
        currency: USD
        unit: per-call
        description: $0.10 per API call exceeding monthly quota
    features:
      - All core API features
      - Document OCR and fraud detection
      - Face matching and liveness detection
      - AML/PEP screening
      - Prime ID Scanner (desktop)
      - Transaction Vault
    excludes:
      - DocuPass Personalized Branding

  - name: Business
    description: >-
      High-volume plan for established businesses requiring full feature
      access including DocuPass white-label branding. Supports approximately
      15,000 ID verifications or 7,500 DocuPass verifications per month.
      Lowest overage rate at $0.08 per call.
    url: https://www.idanalyzer.com/en/pricing
    price:
      amount: 880
      currency: USD
      period: monthly
    quotas:
      - type: APICredits
        limit: 15000
        period: monthly
        description: 15,000 API credits included per month
      - type: VaultStorage
        limit: 150000
        unit: documents
        description: Up to 150,000 stored documents in Transaction Vault
      - type: Overage
        rate: 0.08
        currency: USD
        unit: per-call
        description: $0.08 per API call exceeding monthly quota
    features:
      - All core API features
      - Document OCR and fraud detection
      - Face matching and liveness detection
      - AML/PEP screening
      - Prime ID Scanner (desktop)
      - Transaction Vault
      - DocuPass Personalized Branding (white-label)

  - name: Enterprise (ID Fort)
    description: >-
      On-premise enterprise deployment for organizations with data sovereignty
      requirements. ID Fort runs entirely within the customer's own
      infrastructure. Custom pricing available upon request.
    url: https://www.idanalyzer.com/en/solutions/on-premise
    price:
      amount: 0
      currency: USD
      period: custom
      note: Custom pricing — contact sales
    features:
      - On-premise deployment
      - Full data sovereignty
      - All cloud API features
      - Custom SLA and support
      - Configurable endpoints

billing:
  annualDiscount: 25%
  annualNote: >-
    All monthly plans are available at a 25% discount when billed annually.
